<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Detalles Aleydy 🎀</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');
    .font-brand { font-family: 'Playfair Display', Georgia, serif; }
    .tab-active { border-bottom: 3px solid #E91E8C; color: #E91E8C; }
    .toast { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-overlay { background: rgba(0,0,0,0.5); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- LOGIN -->
<div id="login-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-pink-50 via-white to-pink-100">
  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
    <div class="text-center mb-6">
      <span class="text-5xl">🎀</span>
      <h1 class="font-brand text-3xl font-bold text-pink-600 mt-2">Detalles Aleydy</h1>
      <p class="text-gray-500 mt-1">Panel de Administracion</p>
    </div>
    <div id="login-error" class="hidden bg-red-50 text-red-600 px-4 py-3 rounded-lg mb-4 text-sm"></div>
    <form id="login-form" class="space-y-4">
      <input id="token-input" type="password" placeholder="Token de acceso" required
             class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-pink-400 focus:border-transparent outline-none">
      <button type="submit" class="w-full bg-pink-500 text-white py-3 rounded-xl font-bold hover:bg-pink-600 transition">
        Ingresar
      </button>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-2xl">🎀</span>
        <span class="font-brand text-xl font-bold text-pink-600">Dashboard Aleydy</span>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-xs text-gray-400" id="server-host"></span>
        <button onclick="logout()" class="text-sm text-red-500 hover:text-red-700 font-medium">Salir</button>
      </div>
    </div>
  </nav>

  <div id="toast" class="hidden fixed top-20 right-4 z-50 toast px-6 py-3 rounded-xl shadow-lg text-white font-medium"></div>

  <div class="max-w-7xl mx-auto px-4 py-6">
    <!-- TABS -->
    <div class="flex gap-1 border-b mb-6">
      <button onclick="switchTab('productos')" id="tab-productos" class="tab-active px-6 py-3 font-medium transition">📦 Productos</button>
      <button onclick="switchTab('pedidos')" id="tab-pedidos" class="px-6 py-3 font-medium text-gray-500 hover:text-pink-500 transition">📋 Pedidos</button>
      <button onclick="switchTab('categorias')" id="tab-categorias" class="px-6 py-3 font-medium text-gray-500 hover:text-pink-500 transition">🏷️ Categorias</button>
    </div>

    <!-- PRODUCTOS -->
    <div id="panel-productos">
      <div class="flex justify-between items-center mb-4">
        <h2 class="font-brand text-2xl font-bold">Productos (<span id="count-productos">0</span>)</h2>
        <button onclick="openProductModal()" class="bg-pink-500 text-white px-5 py-2 rounded-xl font-bold hover:bg-pink-600 transition">+ Nuevo</button>
      </div>
      <div id="lista-productos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>

    <!-- PEDIDOS -->
    <div id="panel-pedidos" class="hidden">
      <h2 class="font-brand text-2xl font-bold mb-4">Pedidos Recientes</h2>
      <div id="lista-pedidos" class="space-y-3"></div>
    </div>

    <!-- CATEGORIAS -->
    <div id="panel-categorias" class="hidden">
      <div class="flex justify-between items-center mb-4">
        <h2 class="font-brand text-2xl font-bold">Categorias</h2>
        <button onclick="openCatModal()" class="bg-pink-500 text-white px-5 py-2 rounded-xl font-bold hover:bg-pink-600 transition">+ Nueva</button>
      </div>
      <div id="lista-categorias" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div id="product-modal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
    <div class="p-6">
      <h3 id="modal-title" class="font-brand text-xl font-bold mb-4">Nuevo Producto</h3>
      <form id="product-form" class="space-y-3">
        <input type="hidden" id="prod-id">
        <input id="prod-nombre" placeholder="Nombre" required class="w-full px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-pink-400">
        <select id="prod-categoria" required class="w-full px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-pink-400"><option value="">Categoria</option></select>
        <textarea id="prod-descripcion" placeholder="Descripcion" rows="2" class="w-full px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-pink-400"></textarea>
        <div class="flex gap-3">
          <input id="prod-precio" type="number" step="0.01" placeholder="Precio S/" required class="flex-1 px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-pink-400">
          <input id="prod-foto" type="hidden">
        </div>
        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-600">📸 Foto del producto</label>
          <div class="flex items-center gap-3">
            <input type="file" id="prod-foto-file" accept="image/*" class="flex-1 text-sm file:mr-3 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-pink-50 file:text-pink-600 hover:file:bg-pink-100">
            <button type="button" onclick="clearFoto()" class="text-xs text-red-500 hover:text-red-700 hidden" id="btn-clear-foto">✕ Quitar</button>
          </div>
          <div id="foto-preview" class="hidden mt-2 relative">
            <img id="foto-preview-img" src="" class="w-full h-40 object-cover rounded-xl border">
            <span class="text-xs text-gray-400 mt-1 block" id="foto-preview-size"></span>
          </div>
        </div>
        <div class="flex gap-3">
          <input id="prod-badge" placeholder="Badge" class="flex-1 px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-pink-400">
          <label class="flex items-center gap-2"><input type="checkbox" id="prod-destacado"> ⭐ Destacado</label>
          <label class="flex items-center gap-2"><input type="checkbox" id="prod-activo" checked> ✅ Activo</label>
        </div>
        <div class="flex gap-3 pt-3">
          <button type="button" onclick="closeProductModal()" class="flex-1 border px-4 py-2 rounded-xl hover:bg-gray-50">Cancelar</button>
          <button type="submit" class="flex-1 bg-pink-500 text-white py-2 rounded-xl font-bold hover:bg-pink-600">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- CAT MODAL -->
<div id="cat-modal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
    <h3 class="font-brand text-xl font-bold mb-4">Categoria</h3>
    <form id="cat-form" class="space-y-3">
      <input type="hidden" id="cat-id">
      <input id="cat-nombre" placeholder="Nombre" required class="w-full px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-pink-400">
      <input id="cat-orden" type="number" placeholder="Orden" required class="w-full px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-pink-400">
      <div class="flex gap-3 pt-3">
        <button type="button" onclick="closeCatModal()" class="flex-1 border px-4 py-2 rounded-xl hover:bg-gray-50">Cancelar</button>
        <button type="submit" class="flex-1 bg-pink-500 text-white py-2 rounded-xl font-bold hover:bg-pink-600">Guardar</button>
      </div>
    </form>
  </div>
</div>

<script>
// ====== STATE ======
const API = '';
let TOKEN = localStorage.getItem('aleydy_token') || '';
let currentTab = 'productos';
let editingId = null;
let fotoBase64 = '';  // Imagen en base64 para enviar al guardar

// ====== IMAGE UPLOADER ======
document.getElementById('prod-foto-file').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  // Validar tamaño max 400KB para no saturar Firestore
  if (file.size > 400 * 1024) {
    toast('Imagen muy grande (max 400KB). Reducila.', 'error');
    this.value = '';
    return;
  }

  const reader = new FileReader();
  reader.onload = function(ev) {
    fotoBase64 = ev.target.result;
    document.getElementById('prod-foto').value = fotoBase64;
    document.getElementById('foto-preview-img').src = fotoBase64;
    document.getElementById('foto-preview').classList.remove('hidden');
    document.getElementById('btn-clear-foto').classList.remove('hidden');
    document.getElementById('foto-preview-size').textContent = 
      Math.round(file.size / 1024) + ' KB — ' + file.name;
    toast('Foto cargada ✅', 'success');
  };
  reader.readAsDataURL(file);
});

function clearFoto() {
  fotoBase64 = '';
  document.getElementById('prod-foto').value = '';
  document.getElementById('prod-foto-file').value = '';
  document.getElementById('foto-preview').classList.add('hidden');
  document.getElementById('btn-clear-foto').classList.add('hidden');
  document.getElementById('foto-preview-img').src = '';
}

// ====== AUTH ======
if (TOKEN) checkAuth();

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const token = document.getElementById('token-input').value;
  const resp = await fetch(API + '/api/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({token})
  });
  const data = await resp.json();
  if (data.ok) {
    TOKEN = token;
    localStorage.setItem('aleydy_token', TOKEN);
    showDashboard();
  } else {
    document.getElementById('login-error').textContent = 'Token incorrecto';
    document.getElementById('login-error').classList.remove('hidden');
  }
});

async function checkAuth() {
  const resp = await fetch(API + '/api/auth/check', {
    headers: {'Authorization': 'Bearer ' + TOKEN}
  });
  const data = await resp.json();
  if (data.ok) showDashboard();
  else { TOKEN = ''; localStorage.removeItem('aleydy_token'); }
}

function showDashboard() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('server-host').textContent = window.location.hostname + (window.location.port ? ':' + window.location.port : '');
  loadData();
}

function logout() {
  TOKEN = '';
  localStorage.removeItem('aleydy_token');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('dashboard').classList.add('hidden');
}

// ====== API HELPERS ======
async function api(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {'Authorization': 'Bearer ' + TOKEN}
  };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const resp = await fetch(API + path, opts);
  if (resp.status === 401) { logout(); throw new Error('No autorizado'); }
  return resp.json();
}

// ====== TABS ======
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('[id^="tab-"]').forEach(b => b.classList.remove('tab-active'));
  document.getElementById('tab-' + tab).classList.add('tab-active');
  document.querySelectorAll('[id^="panel-"]').forEach(p => p.classList.add('hidden'));
  document.getElementById('panel-' + tab).classList.remove('hidden');
  loadData();
}

// ====== TOAST ======
function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'fixed top-20 right-4 z-50 toast px-6 py-3 rounded-xl shadow-lg text-white font-medium ' +
    (type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500');
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 3000);
}

// ====== LOAD ======
async function loadData() {
  if (currentTab === 'productos') await loadProductos();
  else if (currentTab === 'pedidos') await loadPedidos();
  else if (currentTab === 'categorias') await loadCategorias();
}

async function loadProductos() {
  const prods = await api('/api/productos');
  document.getElementById('count-productos').textContent = prods.length;
  document.getElementById('lista-productos').innerHTML = prods.map(p => `
    <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-lg transition ${!p.activo ? 'opacity-50' : ''}">
      <div class="flex justify-between items-start mb-2">
        <div>
          <h3 class="font-bold text-lg">${p.nombre} ${p.badge ? '<span class="text-xs bg-pink-100 text-pink-600 px-2 py-0.5 rounded-full">'+p.badge+'</span>' : ''}</h3>
          <p class="text-gray-500 text-sm">${p.descripcion}</p>
        </div>
        ${p.destacado ? '<span class="text-yellow-500">⭐</span>' : ''}
      </div>
      <div class="flex justify-between items-center mt-3">
        <span class="text-2xl font-bold text-pink-500">S/${p.precio}</span>
        <div class="flex gap-2">
          <button onclick="editProducto('${p.id}')" class="text-blue-500 hover:bg-blue-50 px-3 py-1 rounded-lg text-sm">Editar</button>
          <button onclick="deleteProducto('${p.id}')" class="text-red-500 hover:bg-red-50 px-3 py-1 rounded-lg text-sm">Eliminar</button>
        </div>
      </div>
      ${p.foto ? '<img src="'+p.foto+'" class="mt-3 w-full h-32 object-cover rounded-lg" onerror="this.style.display=\'none\'">' : '<div class="mt-3 h-20 bg-pink-50 rounded-lg flex items-center justify-center text-pink-300 text-sm">Sin foto</div>'}
      <span class="text-xs text-gray-400 mt-2 block">ID: ${p.id} | ${p.categoria}</span>
    </div>`).join('');
}

async function loadPedidos() {
  try {
    const pedidos = await api('/api/pedidos');
    document.getElementById('lista-pedidos').innerHTML = pedidos.length === 0
      ? '<p class="text-center text-gray-400 py-10">No hay pedidos aun 🎀</p>'
      : pedidos.map(p => `
        <div class="bg-white rounded-xl shadow-sm p-5 flex justify-between items-center ${p.estado === 'nuevo' ? 'border-l-4 border-pink-500' : ''}">
          <div>
            <p class="font-bold">${p.producto || 'Pedido #' + p.id}</p>
            <p class="text-sm text-gray-500">${p.cliente || 'Cliente'} — ${p.telefono || ''}</p>
            <p class="text-xs text-gray-400">${p.fecha || ''}</p>
          </div>
          <div class="flex items-center gap-3">
            <select onchange="updateEstado('${p.id}', this.value)" class="text-sm border rounded-lg px-3 py-1">
              <option ${p.estado==='nuevo'?'selected':''} value="nuevo">🆕 Nuevo</option>
              <option ${p.estado==='preparando'?'selected':''} value="preparando">🔨 Preparando</option>
              <option ${p.estado==='listo'?'selected':''} value="listo">✅ Listo</option>
              <option ${p.estado==='entregado'?'selected':''} value="entregado">📦 Entregado</option>
              <option ${p.estado==='cancelado'?'selected':''} value="cancelado">❌ Cancelado</option>
            </select>
            <span class="font-bold text-pink-500">S/${p.total || 0}</span>
          </div>
        </div>`).join('');
  } catch (e) { document.getElementById('lista-pedidos').innerHTML = '<p class="text-center text-gray-400 py-10">Error al cargar</p>'; }
}

async function loadCategorias() {
  const cats = await api('/api/categorias');
  document.getElementById('lista-categorias').innerHTML = cats.map(c => `
    <div class="bg-white rounded-xl shadow-md p-5">
      <h3 class="font-bold text-lg">${c.nombre}</h3>
      <p class="text-sm text-gray-500">Orden: ${c.orden}</p>
      <div class="flex gap-2 mt-3">
        <button onclick="editCategoria('${c.id}')" class="text-blue-500 hover:bg-blue-50 px-3 py-1 rounded-lg text-sm">Editar</button>
        <button onclick="deleteCategoria('${c.id}')" class="text-red-500 hover:bg-red-50 px-3 py-1 rounded-lg text-sm">Eliminar</button>
      </div>
    </div>`).join('');
}

// ====== PRODUCTOS CRUD ======
async function openProductModal(id = null) {
  editingId = id;
  document.getElementById('modal-title').textContent = id ? 'Editar Producto' : 'Nuevo Producto';
  document.getElementById('product-modal').classList.remove('hidden');

  // Resetear uploader
  fotoBase64 = '';
  document.getElementById('prod-foto').value = '';
  document.getElementById('prod-foto-file').value = '';
  document.getElementById('foto-preview').classList.add('hidden');
  document.getElementById('btn-clear-foto').classList.add('hidden');
  document.getElementById('foto-preview-img').src = '';

  // Cargar categorias en el select
  const cats = await api('/api/categorias');
  document.getElementById('prod-categoria').innerHTML = '<option value="">Categoria</option>' +
    cats.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');

  if (id) {
    const prods = await api('/api/productos');
    const p = prods.find(x => x.id === id);
    if (p) {
      document.getElementById('prod-id').value = p.id;
      document.getElementById('prod-nombre').value = p.nombre;
      document.getElementById('prod-categoria').value = p.categoria;
      document.getElementById('prod-descripcion').value = p.descripcion || '';
      document.getElementById('prod-precio').value = p.precio;
      document.getElementById('prod-badge').value = p.badge || '';
      document.getElementById('prod-destacado').checked = p.destacado;
      document.getElementById('prod-activo').checked = p.activo !== false;
      
      // Mostrar preview de imagen existente
      if (p.foto) {
        document.getElementById('foto-preview-img').src = p.foto;
        document.getElementById('foto-preview').classList.remove('hidden');
        document.getElementById('btn-clear-foto').classList.remove('hidden');
        document.getElementById('foto-preview-size').textContent = p.foto.startsWith('data:') 
          ? 'Imagen actual (base64)' 
          : 'Ruta: ' + p.foto;
        // Si es data URL, mantenerlo; si es ruta, mantenerla
        if (p.foto.startsWith('data:')) {
          fotoBase64 = p.foto;
          document.getElementById('prod-foto').value = p.foto;
        } else {
          document.getElementById('prod-foto').value = p.foto;
        }
      }
    }
  } else {
    document.getElementById('product-form').reset();
    document.getElementById('prod-id').value = '';
    document.getElementById('prod-activo').checked = true;
  }
}

function closeProductModal() { document.getElementById('product-modal').classList.add('hidden'); }

document.getElementById('product-form').addEventListener('submit', async e => {
  e.preventDefault();
  const data = {
    id: document.getElementById('prod-id').value || null,
    nombre: document.getElementById('prod-nombre').value,
    categoria: document.getElementById('prod-categoria').value,
    descripcion: document.getElementById('prod-descripcion').value,
    precio: parseFloat(document.getElementById('prod-precio').value),
    foto: document.getElementById('prod-foto').value,
    badge: document.getElementById('prod-badge').value,
    destacado: document.getElementById('prod-destacado').checked,
    activo: document.getElementById('prod-activo').checked
  };
  await api('/api/productos', 'POST', data);
  toast(editingId ? 'Actualizado ✅' : 'Creado ✅');
  closeProductModal();
  loadProductos();
});

async function deleteProducto(id) {
  const prods = await api('/api/productos');
  const p = prods.find(x => x.id === id);
  if (!confirm('Eliminar "' + (p?.nombre || id) + '"?')) return;
  await api('/api/productos/' + id, 'DELETE');
  toast('Eliminado ✅');
  loadProductos();
}

async function editProducto(id) { await openProductModal(id); }

// ====== PEDIDOS ======
async function updateEstado(id, estado) {
  await api('/api/pedidos/estado', 'POST', {id, estado});
  toast('Estado actualizado ✅');
}

// ====== CATEGORIAS CRUD ======
async function openCatModal(id = null) {
  editingId = id;
  document.getElementById('cat-modal').classList.remove('hidden');
  if (id) {
    const cats = await api('/api/categorias');
    const c = cats.find(x => x.id === id);
    if (c) {
      document.getElementById('cat-id').value = c.id;
      document.getElementById('cat-nombre').value = c.nombre;
      document.getElementById('cat-orden').value = c.orden;
    }
  } else {
    document.getElementById('cat-form').reset();
    document.getElementById('cat-id').value = '';
  }
}

function closeCatModal() { document.getElementById('cat-modal').classList.add('hidden'); }

document.getElementById('cat-form').addEventListener('submit', async e => {
  e.preventDefault();
  await api('/api/categorias', 'POST', {
    id: document.getElementById('cat-id').value || null,
    nombre: document.getElementById('cat-nombre').value,
    orden: parseInt(document.getElementById('cat-orden').value)
  });
  toast('Guardado ✅');
  closeCatModal();
  loadCategorias();
});

async function deleteCategoria(id) {
  if (!confirm('Eliminar esta categoria?')) return;
  await api('/api/categorias/' + id, 'DELETE');
  toast('Eliminada ✅');
  loadCategorias();
}

async function editCategoria(id) { await openCatModal(id); }
</script>
</body>
</html>
